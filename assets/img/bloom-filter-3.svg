<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- ✅ background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- String label -->
  <text x="300" y="20" text-anchor="middle" font-family="monospace" font-size="16">
    jack
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="aqua"/>
    </marker>
  </defs>

  <!-- Array boxes (values = 0) -->
  <g font-family="monospace" font-size="14" text-anchor="middle">
    <!-- boxes -->
    <!-- each box width = 50 -->
    <!-- row Y = 80 -->
    <!-- values -->
    <g>
      <rect x="50"  y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="100" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="150" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="200" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="250" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="300" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="350" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="400" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="450" y="80" width="50" height="40" fill="none" stroke="black"/>
      <rect x="500" y="80" width="50" height="40" fill="none" stroke="black"/>

      <!-- values (all 0) -->
      <text x="75"  y="105">0</text>
      <text x="125" y="105" fill="aqua">1</text>
      <text x="175" y="105" fill="red">1</text>
      <text x="225" y="105" fill="red">1</text>
      <text x="275" y="105">0</text>
      <text x="325" y="105" fill="aqua">1</text>
      <text x="375" y="105">0</text>
      <text x="425" y="105">0</text>
      <text x="475" y="105" fill="red">1</text>
      <text x="525" y="105">0</text>
    </g>

    <!-- indices below -->
    <g font-size="12">
      <text x="75"  y="140">0</text>
      <text x="125" y="140">1</text>
      <text x="175" y="140">2</text>
      <text x="225" y="140">3</text>
      <text x="275" y="140">4</text>
      <text x="325" y="140">5</text>
      <text x="375" y="140">6</text>
      <text x="425" y="140">7</text>
      <text x="475" y="140">8</text>
      <text x="525" y="140">9</text>
    </g>
  </g>

  <!-- Arrows -->
  <!-- index 2 -->
  <line x1="300" y1="30" x2="125" y2="80" stroke="aqua" marker-end="url(#arrow)"/>
  <!-- index 3 -->
  <line x1="300" y1="30" x2="325" y2="80" stroke="aqua" marker-end="url(#arrow)"/>
  <!-- index 8 -->
  <line x1="300" y1="30" x2="475" y2="80" stroke="aqua" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text x="213" y="55" font-family="Arial" font-size="12">h1</text>
  <text x="313" y="55" font-family="Arial" font-size="12">h2</text>
  <text x="388" y="55" font-family="Arial" font-size="12">h3</text>
</svg>

